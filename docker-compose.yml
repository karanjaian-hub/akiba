networks:
  akiba-network:
    driver: bridge

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: akiba_db
      POSTGRES_USER: akiba
      POSTGRES_PASSWORD: akiba_secret
    ports:
      - "5432:5432"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akiba -d akiba_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  # ─── Application Services ─────────────────────────────────────
  pdf-helper:
    build: ./backend/pdf-helper
    container_name: pdf-helper
    ports:
      - "8099:8099"
    networks:
      - akiba-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8099/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    build: ./backend/auth-service
    ports:
      - "8081:8081"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8081
      AT_API_KEY: ${AT_API_KEY}
      AT_USERNAME: ${AT_USERNAME}
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  transaction-service:
    build: ./backend/transaction-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8082
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  parsing-service:
    build: ./backend/parsing-service
    ports:
      - "8083:8083"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8083
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      pdf-helper:
        condition: service_started
    restart: on-failure

  ai-service:
    build: ./backend/ai-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8084
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  payment-service:
    build: ./backend/payment-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8085
      DARAJA_CONSUMER_KEY: ${DARAJA_CONSUMER_KEY}
      DARAJA_CONSUMER_SECRET: ${DARAJA_CONSUMER_SECRET}
      DARAJA_SHORTCODE: ${DARAJA_SHORTCODE}
      DARAJA_PASSKEY: ${DARAJA_PASSKEY}
      DARAJA_CALLBACK_URL: ${DARAJA_CALLBACK_URL}
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  budget-service:
    build: ./backend/budget-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8086
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  savings-service:
    build: ./backend/savings-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8087
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8088:8088"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8088
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # ─── API Gateway (depends on all app services) ────────────────
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8080
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      transaction-service:
        condition: service_started
      parsing-service:
        condition: service_started
      ai-service:
        condition: service_started
      payment-service:
        condition: service_started
      budget-service:
        condition: service_started
      savings-service:
        condition: service_started
      notification-service:
        condition: service_started
      pdf-helper:
        condition: service_started
    restart: on-failure


