# .env.example — copy to .env and fill in values before running
# JWT_SECRET=your_jwt_secret_here

networks:
  akiba-network:
    driver: bridge

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: akiba_db
      POSTGRES_USER: akiba
      POSTGRES_PASSWORD: akiba_secret
    ports:
      - "5432:5432"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akiba -d akiba_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - akiba-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Application Services ─────────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8081
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  transaction-service:
    build: ./backend/transaction-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8082
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  parsing-service:
    build: ./backend/parsing-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8083
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build: ./backend/ai-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8084
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: ./backend/payment-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8085
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  budget-service:
    build: ./backend/budget-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8086
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  savings-service:
    build: ./backend/savings-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8087
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8088:8088"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8088
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── API Gateway (depends on all app services) ────────────────
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: akiba_db
      DB_USER: akiba
      DB_PASS: akiba_secret
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8080
    networks:
      - akiba-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      transaction-service:
        condition: service_started
      parsing-service:
        condition: service_started
      ai-service:
        condition: service_started
      payment-service:
        condition: service_started
      budget-service:
        condition: service_started

  pdf-helper:
    build: ./backend/pdf-helper
    container_name: pdf-helper
    ports:
      - "8099:8099"
    networks:
      - akiba-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 30s
      timeout: 10s
      retries: 3
